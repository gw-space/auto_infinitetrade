services:
  trading-bot:
    build: .
    container_name: infinitetrade-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./credentials:/app/credentials:ro
    environment:
      - TZ=US/Eastern
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
