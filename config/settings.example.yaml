# 라오어 무한매수법 자동매매 설정

# 매매 대상 종목 (멀티 종목 지원)
tickers:
  - symbol: "TQQQ"
    exchange: "NASD"        # NASD, NYSE, AMEX
    total_capital: 10000.0  # USD - 이 종목에 투입할 총 자금
    num_splits: 40          # 분할 수 (기본 40)
    profit_target_pct: 0.10 # 목표 수익률 (10%)

# 스케줄 설정
schedule:
  # 미장 개장 후 주문 시간 (US Eastern Time)
  order_time: "09:35"
  # 마감 후 체결 확인 시간 (US Eastern Time)
  check_time: "16:15"
  # 일일 리포트 발송 시간 (US Eastern Time)
  report_time: "16:30"

# 40회차 소진 전략
# quarter: 1/4 매도 후 시드 재확보, 매수 재개
# lower_target: 목표 수익률 5%로 하향
# hold: 매수 중단, 매도만 유지
# full_exit: 전량 매도 후 새 사이클
over40_strategy: "quarter"

# 알림 설정
alerts:
  max_drawdown_pct: 0.20   # 최대 낙폭 경고 기준 (-20%)
  order_retry_count: 3      # 주문 실패 재시도 횟수

# 백업 설정
backup:
  monthly_day: 1            # 매월 백업일 (1일)

# 환율 조회 소스
exchange_rate:
  source: "KIS"             # KIS API에서 환율 조회
